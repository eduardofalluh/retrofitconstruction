<div class="container">

<!DOCTYPE html>
<html>
<head>
    <title>Retrofit Construction</title>
    <meta charset="UTF-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <link rel="stylesheet" href="./css/contactus.css">
    <link rel="icon" href="./img/favicon.png" type="image/png">

</head>
<body>
    <header style="display: none;">
        <nav class="navbar">
            <div class="burger-bar" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-overlay">
                <div class="menu-options">
                    <a href="./aboutpage.html">about</a>
                    <a href="./servicepage.html">services</a>
                    <a href="./projects.html" id="option3">projects</a>
                    <a href="./ressources.html">resources</a>
                    <button class="close-button" onclick="toggleMenu()">X</button>
                </div>
            </div>
            <a href="./index.html"><img src="./img/logo.png" alt="Logo"></a>
            <div class="language-switch">
                <a href="#" class="language-link">en/fr</a>
            </div>
        </nav>
    </header>

    <div class="contact-us-animation">
        <h1 id="contact-us-text" class="animated-text">contact us</h1>
    </div>

    <main style="display: none;">
        <h1 style="margin-left: 35px;">contact us</h1>
        <div class="contact-text">
            <a>Fellipe Falluh</a><br>
            <a>fellipe@retrofitconstruction.ca</a>
        </div>
        <iframe class="iframe" src="https://buildertrend.net/leads/contactforms/ContactFormFrame.aspx?builderID=104712" scrolling="no" id="btIframe" style="background:transparent;margin-left:35px;width:100%;height:650px;    font-family: 'Lora', serif;"></iframe>
    </main>

    <footer style="display: none;">
        <div class="footer-section">
            <p><a href="./FAQ.html" class="footer-link">faq</a></p>
            <p><a style="font-size: 17px;" class="footer-link" href="https://www.instagram.com/retrofitconstruction/">instagram</a></p>
            <p class=" footer-link">rbq 5825-8377-01</p>
            <p><a href="./contactus.html" class="footer-link">contact us</a></p>
        </div>
        <div class="text-rights-reserved">© 2024 All Rights Reserved</div>

    </footer>

    <script>
        function toggleMenu() {
            var menuOverlay = document.querySelector('.menu-overlay');
            if (menuOverlay.classList.contains('active')) {
                menuOverlay.classList.add('closing');
                setTimeout(function() {
                    menuOverlay.classList.remove('active', 'closing');
                }, 500); // match the duration of the dropUp animation
            } else {
                menuOverlay.classList.add('active');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const animationDiv = document.querySelector('.contact-us-animation');
            const mainContent = document.querySelector('main');
            const header = document.querySelector('header');
            const footer = document.querySelector('footer');

            setTimeout(() => {
                animationDiv.classList.add('fade-out');
                setTimeout(() => {
                    animationDiv.style.display = 'none';
                    mainContent.style.display = 'block';
                    header.style.display = 'block';
                    footer.style.display = 'block';
                    mainContent.classList.add('fade-in');
                    header.classList.add('slide-in');
                    footer.classList.add('slide-in');
                }, 1000);
            }, 1000); // Adjust the duration as needed
        });
    </script>

<script>
    window.addEventListener('load', function() {
        window.scrollTo(0, 0);
    });
</script>

</body>
</html>
</div>
